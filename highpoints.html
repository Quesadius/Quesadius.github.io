<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US State High Points Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        climbed: '#10b981', // emerald-500
                        unclimbed: '#cbd5e1', // slate-300
                    }
                }
            }
        }
    </script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://d3js.org/topojson.v3.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="bg-slate-50 text-slate-800 font-sans antialiased selection:bg-emerald-200 selection:text-emerald-900">

    <div class="container mx-auto p-4 md:p-8 max-w-7xl">
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-slate-900 to-slate-600 tracking-tight pb-2">U.S. State High Point Tracker</h1>
        </header>

        <!-- Map and Legend Section -->
        <div class="w-full mx-auto bg-white p-6 sm:p-8 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100">
            <div id="map-container" class="relative min-h-[610px] flex items-center justify-center bg-slate-50/50 rounded-xl border border-slate-100/50 overflow-hidden">
                <!-- Loading indicator -->
                <div id="loading" class="text-center flex flex-col items-center">
                    <div class="w-10 h-10 border-4 border-slate-200 border-l-emerald-500 rounded-full animate-spin"></div>
                    <p class="mt-4 text-slate-500 font-medium animate-pulse">Loading map and climb data...</p>
                </div>
            </div>
            <div id="legend" class="flex items-center justify-center mt-6 space-x-8 text-sm" style="display: none;">
                <div class="flex items-center group cursor-default">
                    <div class="w-4 h-4 rounded-full mr-2.5 bg-climbed shadow-sm shadow-emerald-500/20 group-hover:scale-110 transition-transform"></div>
                    <span class="font-semibold text-slate-700">Climbed</span>
                </div>
                <div class="flex items-center group cursor-default">
                    <div class="w-4 h-4 rounded-full mr-2.5 bg-unclimbed shadow-sm shadow-slate-400/20 group-hover:scale-110 transition-transform"></div>
                    <span class="font-semibold text-slate-700">Not Climbed</span>
                </div>
            </div>
            
            <!-- Progress Bar -->
            <div class="mt-10 px-2">
                <div class="flex justify-between items-end mb-2">
                    <span id="progressText" class="text-sm font-semibold text-slate-600 uppercase tracking-wider">Climbed 0 of 50 states</span>
                    <span class="text-2xl font-bold text-slate-800 tabular-nums leading-none"><span id="progressPercentage">0</span>%</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-4 shadow-inner overflow-hidden">
                    <div id="progressBar"
                        class="bg-gradient-to-r from-emerald-400 to-emerald-500 h-full rounded-full transition-all duration-1000 ease-out shadow-[0_0_10px_rgba(52,211,153,0.4)]"
                        style="width: 0%"></div>
                </div>
            </div>

            <!-- Total Stats -->
            <div class="grid grid-cols-2 gap-6 mt-10 border-t pt-8 border-slate-100 px-2">
                <div class="text-center p-4 rounded-2xl bg-slate-50 transition-colors hover:bg-slate-100/80">
                    <div class="text-4xl md:text-5xl font-extrabold text-slate-800 tabular-nums tracking-tight" id="totalMiles">0</div>
                    <div class="text-xs md:text-sm font-bold text-slate-400 uppercase tracking-widest mt-2">Miles Hiked</div>
                </div>
                <div class="text-center p-4 rounded-2xl bg-slate-50 transition-colors hover:bg-slate-100/80">
                    <div class="text-4xl md:text-5xl font-extrabold text-slate-800 tabular-nums tracking-tight" id="totalElevation">0</div>
                    <div class="text-xs md:text-sm font-bold text-slate-400 uppercase tracking-widest mt-2">Elevation Gained (ft)</div>
                </div>
            </div>
        </div>
    </div>

    <div id="tooltip" class="absolute text-left p-4 text-sm bg-slate-900/95 backdrop-blur-sm text-slate-50 border border-slate-700/50 rounded-xl pointer-events-none opacity-0 shadow-2xl z-50 min-w-[200px]"></div>

    <script>
        // --- Static Data Section ---
        // This data remains in the code as it's unlikely to change often.
        const highPointsStaticData = {
            'Alabama': { name: 'Cheaha Mountain', elevation: 2407 }, 'Alaska': { name: 'Denali', elevation: 20310 },
            'Arizona': { name: 'Humphreys Peak', elevation: 12633 }, 'Arkansas': { name: 'Mount Magazine', elevation: 2753 },
            'California': { name: 'Mount Whitney', elevation: 14505 }, 'Colorado': { name: 'Mount Elbert', elevation: 14440 },
            'Connecticut': { name: 'Mount Frissell (south slope)', elevation: 2380 }, 'Delaware': { name: 'Ebright Azimuth', elevation: 448 },
            'Florida': { name: 'Britton Hill', elevation: 345 }, 'Georgia': { name: 'Brasstown Bald', elevation: 4784 },
            'Hawaii': { name: 'Mauna Kea', elevation: 13803 }, 'Idaho': { name: 'Borah Peak', elevation: 12662 },
            'Illinois': { name: 'Charles Mound', elevation: 1235 }, 'Indiana': { name: 'Hoosier Hill', elevation: 1257 },
            'Iowa': { name: 'Hawkeye Point', elevation: 1670 }, 'Kansas': { name: 'Mount Sunflower', elevation: 4039 },
            'Kentucky': { name: 'Black Mountain', elevation: 4145 }, 'Louisiana': { name: 'Driskill Mountain', elevation: 535 },
            'Maine': { name: 'Mount Katahdin', elevation: 5269 }, 'Maryland': { name: 'Hoye-Crest', elevation: 3360 },
            'Massachusetts': { name: 'Mount Greylock', elevation: 3489 }, 'Michigan': { name: 'Mount Arvon', elevation: 1979 },
            'Minnesota': { name: 'Eagle Mountain', elevation: 2301 }, 'Mississippi': { name: 'Woodall Mountain', elevation: 807 },
            'Missouri': { name: 'Taum Sauk Mountain', elevation: 1772 }, 'Montana': { name: 'Granite Peak', elevation: 12807 },
            'Nebraska': { name: 'Panorama Point', elevation: 5424 }, 'Nevada': { name: 'Boundary Peak', elevation: 13147 },
            'New Hampshire': { name: 'Mount Washington', elevation: 6288 }, 'New Jersey': { name: 'High Point', elevation: 1803 },
            'New Mexico': { name: 'Wheeler Peak', elevation: 13161 }, 'New York': { name: 'Mount Marcy', elevation: 5344 },
            'North Carolina': { name: 'Mount Mitchell', elevation: 6684 }, 'North Dakota': { name: 'White Butte', elevation: 3506 },
            'Ohio': { name: 'Campbell Hill', elevation: 1550 }, 'Oklahoma': { name: 'Black Mesa', elevation: 4973 },
            'Oregon': { name: 'Mount Hood', elevation: 11249 }, 'Pennsylvania': { name: 'Mount Davis', elevation: 3213 },
            'Rhode Island': { name: 'Jerimoth Hill', elevation: 812 }, 'South Carolina': { name: 'Sassafras Mountain', elevation: 3553 },
            'South Dakota': { name: 'Black Elk Peak', elevation: 7242 }, 'Tennessee': { name: 'Kuwohi', elevation: 6643 },
            'Texas': { name: 'Guadalupe Peak', elevation: 8751 }, 'Utah': { name: 'Kings Peak', elevation: 13528 },
            'Vermont': { name: 'Mount Mansfield', elevation: 4393 }, 'Virginia': { name: 'Mount Rogers', elevation: 5729 },
            'Washington': { name: 'Mount Rainier', elevation: 14411 }, 'West Virginia': { name: 'Spruce Knob', elevation: 4863 },
            'Wisconsin': { name: 'Timms Hill', elevation: 1951 }, 'Wyoming': { name: 'Gannett Peak', elevation: 13804 }
        };

        // --- D3 Map Drawing ---
        const width = 975;
        const height = 610;
        const mapContainer = d3.select("#map-container");
        const tooltip = d3.select("#tooltip");

        // !!! IMPORTANT !!!
        // Replace this URL with the one you got from publishing your Google Sheet.
        const productionGoogleSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSG_jYamDCnFA5-3hYGaSX_q5XvS5DkLTBEDeee3LYZf6UsnDshd_b_tX2y7De5TTxapR3tngfS3SvZ/pub?output=csv";

        // Automatically use dummy data if running locally
        const isLocalhost = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        const googleSheetUrl = isLocalhost ? "dummy_climb_data.csv" : productionGoogleSheetUrl;

        if (isLocalhost) {
            console.log("Running locally, using dummy data:", googleSheetUrl);
        }

        // Load external data
        Promise.all([
            d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json"),
            d3.csv(googleSheetUrl)
        ]).then(([us, climbData]) => {
            // Hide loading spinner and show legend
            d3.select("#loading").style("display", "none");
            d3.select("#legend").style("display", "flex");

            // Process the climb data from the Google Sheet
            const climbDates = new Map(climbData.map(d => [d.State, {
                date: d.Date,
                miles: d['Miles Hiked'],
                elevationGain: d['Elevation Gained']
            }]));

            // Combine static data with dynamic climb dates
            const finalHighPointsData = {};
            for (const stateName in highPointsStaticData) {
                const climbInfo = climbDates.get(stateName);
                finalHighPointsData[stateName] = {
                    ...highPointsStaticData[stateName],
                    date: climbInfo ? climbInfo.date : null,
                    miles: climbInfo ? climbInfo.miles : null,
                    elevationGain: climbInfo ? climbInfo.elevationGain : null
                };
            }

            // Draw the map
            const svg = mapContainer.append("svg")
                .attr("viewBox", `0 0 ${width} ${height}`)
                .style("width", "100%")
                .style("height", "auto")
                .attr("class", "drop-shadow-sm");

            const projection = d3.geoAlbersUsa().scale(1300).translate([width / 2, height / 2]);
            const path = d3.geoPath().projection(projection);

            svg.append("g")
                .selectAll("path")
                .data(topojson.feature(us, us.objects.states).features)
                .enter().append("path")
                .attr("d", path)
                .attr("class", d => {
                    const stateName = d.properties.name;
                    const data = finalHighPointsData[stateName];
                    const baseClass = "stroke-white stroke-[1.5px] transition-all duration-300 hover:opacity-80 hover:stroke-2 cursor-pointer";
                    return data && data.date ? `fill-climbed ${baseClass}` : `fill-unclimbed ${baseClass}`;
                })
                .on("mouseover", function (event, d) {
                    const stateName = d.properties.name;
                    const data = finalHighPointsData[stateName];

                    d3.select(this).raise().classed('opacity-80 stroke-2', true);

                    tooltip.transition().duration(200).style("opacity", 1);
                    
                    let tooltipContent = `<div class="font-extrabold text-lg border-b border-slate-700/80 pb-2 mb-2">${stateName}</div>`;
                    if (data) {
                        tooltipContent += `<div class="space-y-1">`;
                        tooltipContent += `<div class="flex justify-between gap-4"><strong class="text-slate-400 font-medium">High Point:</strong> <span class="text-right">${data.name}</span></div>`;
                        tooltipContent += `<div class="flex justify-between gap-4"><strong class="text-slate-400 font-medium">Elevation:</strong> <span class="text-right font-semibold text-emerald-400">${data.elevation.toLocaleString()} ft</span></div>`;
                        if (data.date) {
                            tooltipContent += `<div class="flex justify-between gap-4"><strong class="text-slate-400 font-medium">Climbed:</strong> <span class="text-right text-emerald-300">${new Date(data.date).toLocaleDateString()}</span></div>`;
                            if (data.miles) {
                                tooltipContent += `<div class="flex justify-between gap-4"><strong class="text-slate-400 font-medium">Miles Hiked:</strong> <span class="text-right">${data.miles}</span></div>`;
                            }
                            if (data.elevationGain) {
                                tooltipContent += `<div class="flex justify-between gap-4"><strong class="text-slate-400 font-medium">Elevation Gain:</strong> <span class="text-right">${data.elevationGain} ft</span></div>`;
                            }
                        } else {
                            tooltipContent += `<div class="mt-2 text-slate-400 italic text-sm text-center bg-slate-800/50 rounded py-1 px-2">Not Climbed Yet</div>`;
                        }
                        tooltipContent += `</div>`;
                    } else {
                        tooltipContent += `<div class="text-slate-400 italic">No data available</div>`;
                    }
                    
                    tooltip.html(tooltipContent)
                        .style("left", (event.pageX + 15) + "px")
                        .style("top", (event.pageY - 28) + "px");
                })
                .on("mouseout", function () {
                    d3.select(this).classed('opacity-80 stroke-2', false);
                    tooltip.transition().duration(500).style("opacity", 0);
                });

            // --- Progress Bar Update ---
            const totalStates = Object.keys(finalHighPointsData).length;
            const climbedStates = Object.values(finalHighPointsData).filter(d => d.date).length;

            updateProgressBar(climbedStates, totalStates);

            // --- Total Stats Update ---
            let totalMiles = 0;
            let totalElevation = 0;

            climbData.forEach(d => {
                if (d['Miles Hiked']) {
                    totalMiles += parseFloat(d['Miles Hiked']) || 0;
                }
                if (d['Elevation Gained']) {
                    // Remove commas if present and parse
                    const elev = parseInt(d['Elevation Gained'].replace(/,/g, ''), 10);
                    totalElevation += isNaN(elev) ? 0 : elev;
                }
            });

            d3.select("#totalMiles").text(totalMiles.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 1 }));
            d3.select("#totalElevation").text(totalElevation.toLocaleString());

        }).catch(error => {
            // Handle errors, e.g., if the Google Sheet URL is wrong
            console.error("Error loading data:", error);
            d3.select("#loading")
                .html(`<p class="text-red-500 font-medium bg-red-50 p-4 rounded-lg border border-red-200">Failed to load data. Please check the Google Sheet URL and make sure it's published correctly.</p>`);
        });

        // --- Progress Bar Functions ---
        function updateProgressBar(climbedStates, totalStates) {
            const progressPercentage = (climbedStates / totalStates) * 100;
            const roundedPercentage = Math.round(progressPercentage);

            d3.select("#progressBar")
                .style("width", progressPercentage + "%");

            d3.select("#progressText")
                .text(`Climbed ${climbedStates} of ${totalStates} states`);

            // Animate percentage text
            d3.select("#progressPercentage")
                .transition()
                .duration(1000)
                .tween("text", function() {
                    const i = d3.interpolateRound(0, roundedPercentage);
                    return function(t) {
                        this.textContent = i(t);
                    };
                });
        }
    </script>
</body>

</html>
