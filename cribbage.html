        // --- Card Logic ---

        function createDeck() {
            let deck = [];
            for (let s of SUITS) {
                for (let r of RANKS) {
                    deck.push(r + s);
                }
            }
            return deck;
        }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function getCardValue(card) {
            // Returns stats strictly for Pegging (A=1, K=10)
            if (!card) return 0;
            const rank = card.slice(0, -1);
            if (rank === 'A') return 1;
            if (['J', 'Q', 'K'].includes(rank)) return 10;
            return parseInt(rank);
        }

        function getCardRankValue(card) {
            // Returns rank for sorting/runs (A=1, ... K=13)
            const rank = card.slice(0, -1);
            return RANKS.indexOf(rank) + 1;
        }

        // --- Scoring Logic ---

        function calculateHandScore(hand, starterCard, isCrib) {
            // Hand is Array of card strings.
            // Starter is card string (cut card).
            // Returns { score: total, details: ["15 for 2", "Pair for 2"] }
            
            const cards = [...hand, starterCard];
            let points = 0;
            let details = [];

            // 15s (All combinations of 2,3,4,5 cards)
            // Implementation: Recursive subset sum? Or simple combos since n=5
            
            // Helper to get pegging values
            const values = cards.map(c => getCardValue(c));
            
            // 15s - Combinations
            // We can iterate 2^5 combinations (32), check sum=15.
            for (let i = 0; i < (1 << 5); i++) {
                let sum = 0;
                let subset = [];
                for (let j = 0; j < 5; j++) {
                    if ((i >> j) & 1) {
                        sum += values[j];
                        subset.push(cards[j]);
                    }
                }
                if (subset.length >= 2 && sum === 15) {
                    points += 2;
                    details.push(`15 fo 2`);
                }
            }

            // Pairs
            // Check all strictly distinct pairs
            for (let i = 0; i < cards.length; i++) {
                for (let j = i + 1; j < cards.length; j++) {
                    // Compare rank char only
                    if (cards[i].slice(0,-1) === cards[j].slice(0,-1)) {
                        points += 2;
                        details.push(`Pair for 2`);
                    }
                }
            }

            // Runs
            // Sort by Rank Value
            const rankValues = cards.map(c => getCardRankValue(c)).sort((a,b) => a - b);
            
            // Multiplier logic is tricky for "Double Run".
            // Alternative approach: Find longest run of at least 3.
            // Actually, Cribbage rules: "A run of 3 for 3". Multipliers come from Pairs disjointly counted.
            // BUT: "Double Run of 3" (3,3,4,5) is visually "Two runs of 3" + "Pair".
            // Our Pair counter handles the pair. We just need to find all subset runs?
            // Correct Rule: "Look for disjoint runs"
            // Actually standard algo:
            // 1. Look for run of 5. If yes, 5 pts.
            // 2. If no, look for runs of 4. (Could be multiple if pairs exist).
            // 3. If no, look for runs of 3.
            
            // Simple approach: Check all subsets of length 3, 4, 5. 
            // If a subset is a run, score it? 
            // NO. A run of 4 includes sub-runs of 3. You don't score both.
            // You score the "Longest Runs".
            
            let multiplier = 1;
            let runPoints = 0;
            
            // We need to handle duplicates for runs.
            // Algo:
            // Group by Rank.
            // e.g. 4,5,6 -> 1,1,1 -> 1*1*1 = 1 run of 3.
            // e.g. 4,5,5,6 -> 1,2,1 -> 1*2*1 = 2 runs of 3 (Double run).
            // e.g. 4,4,5,5,6 -> 2,2,1 -> 4 runs of 3.
            
            // Map: { rankVal: count }
            const counts = {};
            rankValues.forEach(v => counts[v] = (counts[v] || 0) + 1);
            const distinctRanks = Object.keys(counts).map(Number).sort((a,b) => a-b);
            
            let deepRunStreak = 0;
            let currentRunLength = 0;
            let currentRunMultiplier = 1; // Accumulate counts
            
            for (let i = 0; i < distinctRanks.length; i++) {
                if (i > 0 && distinctRanks[i] === distinctRanks[i-1] + 1) {
                    currentRunLength++;
                    currentRunMultiplier *= counts[distinctRanks[i]];
                } else {
                    // Streak broke
                    if (currentRunLength >= 3) {
                         runPoints += (currentRunLength * currentRunMultiplier);
                         details.push(`Run of ${currentRunLength} (x${currentRunMultiplier}) for ${currentRunLength * currentRunMultiplier}`);
                    }
                    // Reset
                    currentRunLength = 1;
                    currentRunMultiplier = counts[distinctRanks[i]]; 
                    if (!currentRunMultiplier) currentRunMultiplier = 1;
                }
            }
             // Check last streak
            if (currentRunLength >= 3) {
                 runPoints += (currentRunLength * currentRunMultiplier);
                 details.push(`Run of ${currentRunLength} (x${currentRunMultiplier}) for ${currentRunLength * currentRunMultiplier}`);
            }
            points += runPoints;

            // Flush
            // In Hand: 4 cards of same suit in hand = 4 pts. +1 if start match.
            // In Crib: Must be 5 cards (hand + start) same suit.
            
            const handSuits = hand.map(c => c.slice(-1));
            const startSuit = starterCard.slice(-1);
            
            const firstSuit = handSuits[0];
            const allHandSame = handSuits.every(s => s === firstSuit);
            
            if (!isCrib && allHandSame) {
                if (startSuit === firstSuit) {
                    points += 5;
                    details.push("Flush for 5");
                } else {
                    points += 4;
                    details.push("Flush for 4");
                }
            } else if (isCrib && allHandSame && startSuit === firstSuit) {
                 points += 5;
                 details.push("Flush for 5");
            }

            // Nobs (Jack of starter suit in hand)
            hand.forEach(c => {
                 if (c.slice(0,-1) === 'J' && c.slice(-1) === startSuit) {
                     points += 1;
                     details.push("Nobs for 1");
                 }
            });

            return { score: points, details };
        }

        function calculatePegScore(playedCards) {
            // playedCards is Array (oldest to newest)
            // We only care about the end of the array (most recent)
            if (playedCards.length < 2) return { score: 0, details: [] };
            
            let points = 0;
            let details = [];
            const reversed = [...playedCards].reverse();
            const values = reversed.map(c => getCardValue(c)); // Pegging values (A=1, K=10)
            const ranks = reversed.map(c => c.slice(0, -1)); // Rank strings "A", "5"
            const rankValues = reversed.map(c => getCardRankValue(c)); // 1..13

            // 15 (Sum of all played in sequence? NO. Sum of total count usually. 
            // WE DON'T CALCULATE 15 HERE usually, we check the TOTAL COUNT variable.)
            // Actually, "15 for 2" in pegging means the running total reached 15.
            // So we handle that in the main logic, not just by looking at cards.
            // Wait, this function analyzes RECENT COMBOS (Pairs, Runs).
            
            // Pairs
            let pairCount = 0;
            for (let i = 1; i < ranks.length; i++) {
                if (ranks[i] === ranks[0]) pairCount++;
                else break;
            }
            if (pairCount > 0) {
                 // 1 pair (2 cards) = 2
                 // 2 pairs (3 cards aka Pair Royal) = 6
                 // 3 pairs (4 cards aka Double Pair Royal) = 12
                 const pScores = [0, 2, 6, 12];
                 points += pScores[pairCount];
                 details.push(`Pair(${pairCount+1}) for ${pScores[pairCount]}`);
            }
            
            // Runs (sequences)
            // Logic: Check last 3, last 4, last 5...
            let maxRun = 0;
            for (let len = 3; len <= Math.min(playedCards.length, 7); len++) {
                 const subset = rankValues.slice(0, len); // Last 'len' cards (since we reversed, it's 0..len)
                 // Check if 'subset' forms a contiguous run
                 const sorted = [...subset].sort((a,b) => a-b);
                 let isRun = true;
                 for(let k=0; k<len-1; k++) {
                     if (sorted[k+1] !== sorted[k] + 1) {
                         isRun = false;
                         break;
                     }
                 }
                 if (isRun) maxRun = len;
            }
            
            if (maxRun > 0) {
                points += maxRun;
                details.push(`Run of ${maxRun} for ${maxRun}`);
            }
            
            return { score: points, details };
        }

             };

             if (countReset) {
                  updates.history.push("Count 31. Reset.");
             }
             
             await updateGameState(updates);
        }

        async function runShowPhase() {
             // Calculate Scores
             const dealerId = gameState.playerIds.find(pid => gameState.players[pid].isDealer);
             const nonDealerId = gameState.playerIds.find(pid => pid !== dealerId);
             const cut = gameState.cutCard;
             
             // We need the Original Hands? 
             // WAIT. We removed cards from hands during pegging!
             // `gameState.players[uid].hand` is EMPTY now.
             // CRITICAL ERROR in design.
             // We must store the "Full Hand" separately from "Pegging Hand".
             // Or restore them?
             // Since we have `gameState.players[uid].hand` being mutated, we lost the cards for the Show!
             
             // FIX: When dealing, store `hand` AND `showHand`? 
             // Or when throwing, snapshot the 4 cards kept?
             
             // I will implement a fix in `submitDiscard` to save `keptHand`.
             // But for current flow, I'll update logic to rely on `keptHand`.
             
             // Let's assume `keptHand` exists in player object. 
             // I'll add the property in `submitDiscard`.
             
             const ndHand = gameState.players[nonDealerId].keptHand;
             const dHand = gameState.players[dealerId].keptHand;
             const crib = gameState.crib;
             
             const ndScore = calculateHandScore(ndHand, cut, false);
             const dScore = calculateHandScore(dHand, cut, false);
             const cribScore = calculateHandScore(crib, cut, true);
             
             const newPlayers = { ...gameState.players };
             const logs = [];
             
             // Apply Scores Sequentially
             // Non-Dealer
             newPlayers[nonDealerId].score += ndScore.score;
             logs.push(`${gameState.players[nonDealerId].name || 'Opponent'}: ${ndScore.score} (${ndScore.details.join(', ')})`);
             if (newPlayers[nonDealerId].score >= 121) return declareWinner(nonDealerId);
             
             // Dealer
             newPlayers[dealerId].score += dScore.score;
             logs.push(`Dealer (Hand): ${dScore.score} (${dScore.details.join(', ')})`);
             if (newPlayers[dealerId].score >= 121) return declareWinner(dealerId);

             // Crib
             newPlayers[dealerId].score += cribScore.score;
             logs.push(`Dealer (Crib): ${cribScore.score} (${cribScore.details.join(', ')})`);
             if (newPlayers[dealerId].score >= 121) return declareWinner(dealerId);
             
             await updateGameState({
                 players: newPlayers,
                 phase: 'show',
                 roundLog: logs,
                 history: [...gameState.history, ...logs]
             });
        }
        
        async function startNextRound() {
             // Swap Dealer
             const currentDealer = gameState.playerIds.find(pid => gameState.players[pid].isDealer);
             const nextDealer = gameState.playerIds.find(pid => pid !== currentDealer);
             
             const nextPlayers = { ...gameState.players };
             nextPlayers[currentDealer].isDealer = false;
             nextPlayers[nextDealer].isDealer = true;
             
             // Reset State
             await updateGameState({
                 players: nextPlayers,
                 deck: [],
                 hand: [],
                 crib: [],
                 cutCard: null,
                 pegging: { stack: [], total: 0, history: [] },
                 phase: 'deal',
                 turn: nextDealer, // Dealer deals
                 roundLog: [],
                 history: [...gameState.history, "--- New Round ---"]
             });
        }
        
        async function declareWinner(uid) {
             alert(`Game Over! Winner is ${uid}`);
             // Reset or show modal
             // For MVP, just alert.
        }


        async function submitDiscard() {
             if (selectedIndices.size !== 2) return;
             
             const myHand = [...gameState.players[userId].hand];
             const thrown = [];
             // Sort indices desc to splice correctly
             const indices = Array.from(selectedIndices).sort((a,b) => b-a);
             
             indices.forEach(idx => {
                 thrown.push(myHand[idx]);
                 myHand.splice(idx, 1);
             });
             
             const newCrib = [...gameState.crib, ...thrown];
             
             // Check if both have thrown
             const opponentId = gameState.playerIds.find(id => id !== userId);
             const opponent = gameState.players[opponentId]; 
             
             let nextPhase = 'throw';
             let nextHistory = [...gameState.history, "You discarded."];
             let nextTurn = gameState.turn;
             let cutCard = gameState.cutCard;
             let deck = gameState.deck;


             // Fix: Save keptHand for Show
             const keptHand = [...myHand];
             const newPlayerState = { ...gameState.players[userId], hand: myHand, keptHand: keptHand, hasThrown: true };

             // Logic: If opponent already threw (hasThrown flag?), then move to CUT.
             if (opponent && opponent.hasThrown) {
                 nextPhase = 'peg';
                 nextHistory.push("Both discarded. Cut for starter.");
                 
                 // Perform Cut
                 cutCard = deck.shift();
                 
                 // Check Heels (Jack)
                 if (cutCard.slice(0, -1) === 'J') {
                     const dealerId = gameState.playerIds.find(pid => gameState.players[pid].isDealer);
                     // Dealer gets 2 points
                     // We need to update score here... complex in one go.
                     // Let's just flag it or add it.
                     const d = gameState.players[dealerId];
                     d.score += 2; // Mutating original logic flow, be careful
                     nextHistory.push("His Heels! Dealer +2");
                 }
                 
                 // Who starts pegging? The non-dealer.
                 const dealerId = gameState.playerIds.find(pid => gameState.players[pid].isDealer);
                 nextTurn = gameState.playerIds.find(pid => pid !== dealerId);
             }

             await updateGameState({
                 players: {
                     ...gameState.players,
                     [userId]: newPlayerState
                 },
                 crib: newCrib,
                 phase: nextPhase,
                 cutCard: cutCard,
                 deck: deck,
                 turn: nextTurn,
                 history: nextHistory
             });
             
             // Reset UI
             selectedIndices.clear();
        }


        
        // --- Rendering ---
        
        function renderBoard() {
             const boardEl = document.getElementById('board-area');
             boardEl.innerHTML = '';
             
             // Setup Board Container
             const boardContainer = document.createElement('div');
             boardContainer.className = "relative bg-amber-200 border-4 border-amber-900 rounded-full w-full max-w-4xl h-48 md:h-64 shadow-xl flex items-center justify-center overflow-visible";
             
             // We need a path. 
             // Simple visual: 3 "Streets" of 30 holes (+1 Start, +1 End).
             // Let's use CSS Grid within the container to map the 121 points.
             // Actually, SVG path is cleaner for the "Race Track" shape, but CSS Grid is easier to interact with?
             // Let's generate a "U" shape of holes.
             
             const trackDiv = document.createElement('div');
             trackDiv.className = "grid grid-flow-col grid-rows-3 gap-y-6 gap-x-1 md:gap-x-2 p-4";
             // We'll generate 121 holes.
             // Mapping: 1-40 (Street 1), 41-80 (Street 2, reverse?), 81-120 (Street 3). 121 (Game Hole).
             
             // Simplified rendering for MVP:
             // Just render two "Lanes" (Player 1 Red, Player 2 Blue).
             // Each lane has 121 holes.
             
             for(let p=0; p<2; p++) {
                 const lane = document.createElement('div');
                 lane.className = "flex flex-wrap gap-1 items-center justify-start w-full px-4 mb-4";
                 
                 // Holes 1 to 121
                 for(let i=1; i<=121; i++) {
                     const hole = document.createElement('div');
                     hole.className = "w-2 h-2 rounded-full bg-amber-900/30";
                     
                     // Skunk Lines
                     if(i === 91 || i === 61 || i === 121) hole.classList.add("ring-1", "ring-white");

                     // Check Pins
                     // Player indices in playerIds
                     const pId = gameState.playerIds[p];
                     if (pId && gameState.players[pId]) {
                         const score = gameState.players[pId].score;
                         const color = gameState.players[pId].color; // red/blue
                         if (score === i) {
                             hole.className = `w-4 h-4 rounded-full shadow-lg z-10 -ml-1 -mt-1 ring-2 ring-white ${color === 'red' ? 'bg-red-600' : 'bg-blue-600'}`;
                         }
                     }
                     // Optimization: Don't render all 121 on mobile? 
                     // CSS: hidden on small, use counter.
                     
                     lane.appendChild(hole);
                 }
                 boardContainer.appendChild(lane);
             }
             
             // Overlay Text Score
             const scoreOverlay = document.createElement('div');
             scoreOverlay.className = "absolute inset-0 flex items-center justify-center pointer-events-none";
             scoreOverlay.innerHTML = `
                <div class="bg-black/50 text-white px-4 py-2 rounded-xl backdrop-blur-sm">
                    P1: ${gameState.players[gameState.playerIds[0]]?.score || 0}
                    vs
                    P2: ${gameState.players[gameState.playerIds[1]]?.score || 0}
                </div>
             `;
             boardEl.appendChild(boardContainer);
             boardEl.appendChild(scoreOverlay);
        }

        function renderGame() {
            const statusEl = document.getElementById('status-text');
            const myPlayer = gameState.players[userId];
            const opponentId = gameState.playerIds.find(id => id !== userId);
            const opponent = gameState.players[opponentId];

            if(!myPlayer) return; 

            // Update Header
            let statusText = `Phase: ${gameState.phase.toUpperCase()}`;
            if (gameState.phase === 'deal' && gameState.players[gameState.turn]?.isDealer) {
                statusText = `Dealing...`;
            }
            statusEl.textContent = statusText;
            
            
            renderBoard();
            
            // Render Interaction Area
            const handArea = document.getElementById('hand-area');
            handArea.innerHTML = '';
            
            // Action Button Area
            // We need a place for "Deal", "Go", "Confirm Discard"
            // Let's inject a button container into player-area if not exists
            let actionContainer = document.getElementById('action-container');
            if (!actionContainer) {
                actionContainer = document.createElement('div');
                actionContainer.id = 'action-container';
                actionContainer.className = "absolute top-[-3rem] left-1/2 transform -translate-x-1/2 flex gap-2";
                document.getElementById('player-area').appendChild(actionContainer);
            }
            actionContainer.innerHTML = '';

            // Deal Phase
            if (gameState.phase === 'deal' && myPlayer.isDealer) {
                 const btn = document.createElement('button');
                 btn.className = "bg-green-600 text-white font-bold py-2 px-6 rounded-full shadow-lg hover:bg-green-700 animate-bounce";
                 btn.textContent = "DEAL CARDS";
                 btn.onclick = runDeal;
                 actionContainer.appendChild(btn);
            }
            
            // Throw Phase
            if (gameState.phase === 'throw' && !myPlayer.hasThrown) {
                const btn = document.createElement('button');
                btn.id = 'action-btn';
                btn.className = "bg-blue-600 text-white font-bold py-2 px-6 rounded-full shadow-lg opacity-50 cursor-not-allowed transition";
                btn.textContent = "Select 2 to Discard";
                btn.disabled = true;
                btn.onclick = submitDiscard; // Attach initially, though disabled
                actionContainer.appendChild(btn);
            } else if (gameState.phase === 'throw' && myPlayer.hasThrown) {
                 const msg = document.createElement('div');
                 msg.className = "bg-black/50 text-white px-4 py-1 rounded-full text-sm";
                 msg.textContent = "Waiting for opponent...";
                 actionContainer.appendChild(msg);
            }

            // Pegging Phase
            if (gameState.phase === 'peg') {
                 // Draw Table
                 // We need to visualize `pegging.stack`
                 const tableArea = document.getElementById('table-area');
                 tableArea.innerHTML = '';
                 
                 const stackContainer = document.createElement('div');
                 stackContainer.className = "flex -space-x-12 items-center justify-center p-4 overflow-x-auto";
                 
                 gameState.pegging.stack.forEach((cardStr, idx) => {
                     const card = createCardElement(cardStr, true);
                     card.classList.remove('shadow-xl');
                     card.classList.add('shadow-md', 'transform', `rotate-${(idx%3 - 1)*5}`); // Jiggle
                     stackContainer.appendChild(card);
                 });
                 
                 const countDisplay = document.createElement('div');
                 countDisplay.className = "absolute top-2 right-2 bg-black/60 text-white px-3 py-1 rounded-full font-bold text-xl backdrop-blur-md z-10 border border-white/20";
                 countDisplay.textContent = `Count: ${gameState.pegging.total}`;
                 
                 tableArea.appendChild(stackContainer);
                 tableArea.appendChild(countDisplay);

                 // Check for "Go"
                 const isMyTurn = gameState.turn === userId;
                 
                 if (isMyTurn) {
                     // Check if we have ANY legal moves
                     const myHand = myPlayer.hand;
                     const canPlay = myHand.some(c => (getCardValue(c) + gameState.pegging.total) <= 31);
                     
                     if (!canPlay && myHand.length > 0) {
                         // Must Pass
                         const btn = document.createElement('button');
                         btn.className = "bg-red-600 text-white font-bold py-3 px-8 rounded-full shadow-lg animate-pulse z-50 fixed bottom-40 right-10";
                         btn.textContent = "GO / PASS";
                         btn.onclick = handleGo;
                         actionContainer.appendChild(btn);
                     } else if (myHand.length === 0) {
                         // No cards, must pass token (if opponent has cards)
                         // Or if opponent also empty, trigger Show?
                         // We need Logic to detect "End of Pegging Round".
                         // If both hands empty: Phase -> Show.
                         checkEndOfPegging();
                     } else {
                         // Can play. Show prompt?
                         statusEl.textContent += " (Play a card)";
                     }
                 }
            }
            
            // Show Phase
            if (gameState.phase === 'show') {
                 // Display Results
                 // We need a clear overlay or section
                 const tableArea = document.getElementById('table-area');
                 tableArea.innerHTML = '';
                 
                 const resultsContainer = document.createElement('div');
                 resultsContainer.className = "flex flex-col items-center justify-center p-4 bg-white/90 rounded-xl shadow-2xl space-y-4 animate-fade-in";
                 
                 resultsContainer.innerHTML = `<h3 class="text-2xl font-bold text-amber-900 border-b-2 border-amber-900 pb-2">Round Results</h3>`;
                 
                 // Show breakdown if available in history or computed
                 // Ideally we computed it 
                 if (gameState.roundLog) {
                     gameState.roundLog.forEach(log => {
                         const line = document.createElement('div');
                         line.className = "text-lg font-mono text-gray-800";
                         line.textContent = log;
                         resultsContainer.appendChild(line);
                     });
                 }
                 
                 // Next Round Button
                 const btn = document.createElement('button');
                 btn.className = "bg-green-600 text-white font-bold py-2 px-6 rounded-full shadow-lg hover:bg-green-700 mt-4";
                 btn.textContent = "Start Next Round";
                 btn.onclick = startNextRound;
                 
                 resultsContainer.appendChild(btn);
                 tableArea.appendChild(resultsContainer);
            }

            // Render Hand Cards (Correct routing)
            // handArea was defined above
            myPlayer.hand.forEach((cardStr, index) => {
                 const card = createCardElement(cardStr, true);
                 card.id = `card-${index}`;
                 
                 if (gameState.phase === 'throw' && !myPlayer.hasThrown) {
                     card.onclick = () => handleCardSelectForThrow(index);
                 } else if (gameState.phase === 'peg' && gameState.turn === userId) {
                     card.onclick = () => handlePegCardClick(index);
                 }
                 
                 handArea.appendChild(card);
            });

            
            // Render Cut Card (if exists)
            if (gameState.cutCard) {
                 // Place it on table?
                 // For now, render statically
                 const boardArea = document.getElementById('board-area');
                 let cutDisplay = document.getElementById('cut-display');
                 if (!cutDisplay) {
                     cutDisplay = document.createElement('div');
                     cutDisplay.id = 'cut-display';
                     cutDisplay.className = "absolute top-4 left-4 w-16 h-24";
                     boardArea.appendChild(cutDisplay);
                 }
                 cutDisplay.innerHTML = '';
                 cutDisplay.appendChild(createCardElement(gameState.cutCard, true));
            }
        }
        
        function createCardElement(cardString, faceUp) {
            const div = document.createElement('div');
            // Responsive card sizing
            div.className = "relative w-16 h-24 md:w-20 md:h-28 bg-white rounded-lg shadow-xl transform transition hover:-translate-y-2 cursor-pointer border border-gray-200 select-none";
            
            const img = document.createElement('img');
            img.className = "w-full h-full object-contain rounded-lg";
            
            if (!faceUp) {
                img.src = "https://deckofcardsapi.com/static/img/back.png";
            } else {
                let rank = cardString.slice(0, -1);
                const suit = cardString.slice(-1);
                if (rank === '10') rank = '0';
                img.src = `https://deckofcardsapi.com/static/img/${rank}${suit}.png`;
            }
            div.appendChild(img);
            return div;
        }



        
        function showMainMenu() {
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('game-interface').classList.add('hidden');
        }

        async function copyLink() {
            await navigator.clipboard.writeText(window.location.href);
            updateStatus("Link copied!");
            // Temporary toast
            setTimeout(() => {
                 if(gameState.phase) renderGame(); 
                 else document.getElementById('status-text').textContent = "Welcome";
            }, 2000);
        }
        
        function leaveGame() {
            window.location.href = window.location.pathname.split('?')[0];
        }

        function updateStatus(msg) {
            document.getElementById('status-text').textContent = msg;
        }



    </script>
